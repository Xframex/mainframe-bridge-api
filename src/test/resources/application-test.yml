spring:
  application:
    name: zenithbank-mainframe-bridge
  
  # LOCAL SIMULATION MODE 
  datasource:
    url: jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1;MODE=DB2 # Simulates DB2 behavior
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # Automatically creates table for demo
    show-sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
